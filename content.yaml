projects:
  - title: "EmbedGen — Embedded Systems LLM"
    description: "Fine-tuning a 7B-parameter LLM on 40GB of embedded-systems C/C++ codebases using LoRA adapters and custom instruction datasets. Quantized to GGUF (Q4_K_M) for deployment on microcontrollers and edge devices. Training runs on an RTX A6000 at Manipal's research lab — no cloud bill, no budget cap."
    tags: [Python, PyTorch, LoRA, GGUF, CUDA]
    status: WIP
    github: "github.com/trafalgar-2006/EmbedGen"

  - title: "ISRO LEOS — Sim-to-Real Vision"
    description: "Built a full synthetic-to-real perception pipeline for ISRO's Low Earth Orbit Satellite lab. Generated 6,000+ photo-realistic satellite images in BlenderProc with COCO-format annotations. Trained YOLOv7 + Mask R-CNN, then deployed via TensorRT on NVIDIA Jetson for real-time inference. Used GAN-based domain adaptation (Unreal Engine 5) to close the sim-to-real gap."
    tags: [BlenderProc, YOLOv7, TensorRT, Python, OpenCV]
    highlight: "22 FPS on Jetson"
    status: Research
    github: ""

  - title: "Autonomous Trading System"
    description: "End-to-end AI swing-trading agent that generates signals across the entire US equity market. Runs a multi-factor ML model (momentum + sentiment + technicals), executes paper trades via Alpaca API with position sizing and stop-loss logic, and logs every decision to SQLite for post-hoc analysis. Runs 24/7 on Oracle Cloud Always Free — zero hosting cost."
    tags: [Python, SQLite, "Alpaca API", "Oracle Cloud", Pandas]
    status: Live
    github: "github.com/trafalgar-2006/trading-agent"

  - title: "Webcraft Studios — Digital Agency"
    description: "Founded and run a boutique digital agency serving clients across India and the UAE. Built 12+ production websites with custom CMS, SEO pipelines, and performance-optimized delivery. Manages AI-assisted content workflows, analytics dashboards, and client onboarding — solo. Revenue-generating since 2023."
    tags: [React, Node.js, MongoDB, AWS, Python]
    status: Live
    github: ""

  - title: "Bird Sound Species Detector"
    description: "CNN classifier that identifies bird species from raw field audio. Converts MP3 recordings to mel-spectrograms, trains a ResNet-18 on a curated multi-species dataset, and outputs species predictions with confidence scores. Built as a tool for ornithologists doing field surveys without internet access."
    tags: [Python, TensorFlow, ResNet, Librosa]
    highlight: "90%+ accuracy"
    status: Research
    github: ""

  - title: "Frog Call Classifier"
    description: "Audio ML pipeline for automated frog species identification across 803 species. Applies noise reduction, bandpass filtering, and MFCC feature extraction on environmental recordings, then matches peak frequencies against a reference database. Designed for biodiversity researchers processing hundreds of hours of field audio."
    tags: [Python, Librosa, Scikit-learn, NumPy]
    status: Research
    github: ""

  - title: "SSH Portfolio (this one)"
    description: "An interactive TUI portfolio served over raw SSH — no browser, no JavaScript, no loading spinner. Built in Go with Bubbletea and Wish. Features a matrix rain intro, fake SSH handshake boot sequence, typewriter animations, live GitHub commit feed, and tab transitions. Deployed on Railway with a persistent host key and UptimeRobot keep-alive. You're looking at it right now."
    tags: [Go, Bubbletea, Docker, Railway, Wish]
    status: Live
    github: "github.com/trafalgar-2006/portflio"

