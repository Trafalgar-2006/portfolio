projects:
  - title: "EmbedGen — Domain-Specific Code LLM"
    description: "Built a 62M-parameter transformer from scratch trained on embedded-systems C/C++ codebases. Custom BPE tokeniser (32k vocab), MiniHash LSH deduplication, multi-head attention with RoPE + RMSNorm. Quantized to ONNX FP16 for edge deployment. EmbedGen outperforms CodeLLaMA-7B (80x larger) on EmbedEval — a domain-specific benchmark across 10 embedded categories (GPIO, UART, DMA, FreeRTOS, SPI, ADC, Timers, Interrupts). Ships as a VS Code extension with C/C++ autocomplete."
    tags: [Python, PyTorch, ONNX, CUDA, Transformers, FastAPI]
    status: WIP
    github: "github.com/trafalgar-2006/EmbedGen"

  - title: "SAR2EO — Satellite Image Translation"
    description: "Deep learning pipeline that translates Synthetic Aperture Radar (SAR) satellite imagery to Electro-Optical (EO) visible-light images using conditional GANs and diffusion-based domain adaptation. Trained on paired SAR/EO datasets, enabling all-weather all-time satellite reconnaissance from radar-only feeds. Built on top of ISRO LEOS research experience."
    tags: [Python, PyTorch, GANs, OpenCV, NumPy]
    status: WIP
    github: "github.com/trafalgar-2006/sar2eo"

  - title: "ISRO LEOS — Sim-to-Real Vision"
    description: "Built a full synthetic-to-real perception pipeline for ISRO's Low Earth Orbit Satellite lab. Generated 6,000+ photo-realistic satellite images in BlenderProc with automated COCO/YOLO annotations. Implemented SOG2 rotations with spherical camera trajectories for 360° angular coverage. Reduced data generation time 70% by benchmarking path-scaling parameters. Deployed YOLOv7 on NVIDIA Jetson Xavier via TensorRT @ 22 FPS. Built GAN-based domain adaptation to close the sim-to-real gap."
    tags: [BlenderProc, YOLOv7, TensorRT, Python, OpenCV]
    highlight: "22 FPS on Jetson"
    status: Research
    github: ""

  - title: "Autonomous Trading System"
    description: "End-to-end AI swing-trading agent that generates signals across the entire US equity market. Runs a multi-factor ML model (momentum + sentiment + technicals), executes paper trades via Alpaca API with position sizing and stop-loss logic, and logs every decision to SQLite for post-hoc analysis. Runs 24/7 on Oracle Cloud Always Free — zero hosting cost."
    tags: [Python, SQLite, "Alpaca API", "Oracle Cloud", Pandas]
    status: Live
    github: "github.com/trafalgar-2006/autonomous-trading-agent"

  - title: "Zycus — Procurement Intelligence Agent"
    description: "AI-powered procurement analytics and automation agent. Processes supplier data, contract terms, and spend analytics to surface actionable insights and automate repetitive procurement workflows. Built in Python with an agentic pipeline for document parsing, classification, and reporting."
    tags: [Python, AI, Pandas, FastAPI]
    status: WIP
    github: "github.com/trafalgar-2006/zycus"

  - title: "Webcraft Studios — Digital Agency"
    description: "Founded and built a boutique digital agency serving clients across India and the UAE. Engineered full-stack platforms using React, Node.js, MongoDB and Stripe. Scaled to multiple international SaaS clients within the first year. Built a customer-first delivery pipeline (Discovery → Design → Dev → Launch → Support) cutting delivery cycle time by 30%+. Revenue-generating since 2025."
    tags: [React, "Node.js", MongoDB, AWS, Python, Stripe]
    status: Live
    github: ""

  - title: "Bird Sound Species Detector"
    description: "CNN classifier that identifies bird species from raw field audio. Converts MP3 recordings to mel-spectrograms, trains a ResNet-18 on a curated multi-species dataset, outputs species predictions with confidence scores. Built as a field tool for ornithologists doing surveys without internet access."
    tags: [Python, TensorFlow, ResNet, Librosa, CNNs]
    highlight: "90%+ accuracy"
    status: Research
    github: ""

  - title: "BioAcoustic Frog Classifier"
    description: "Audio ML pipeline for automated frog species identification across 803 species. Applies noise reduction, bandpass filtering, and MFCC feature extraction on environmental recordings, then matches peak frequencies against a reference database. Designed for biodiversity researchers processing hundreds of hours of field audio."
    tags: [Python, Librosa, "Scikit-learn", NumPy]
    status: Research
    github: "github.com/trafalgar-2006/BioAcoustic-Frog-Classifier"

  - title: "SSH Portfolio (this one)"
    description: "An interactive TUI portfolio served over raw SSH — no browser, no JavaScript. Built in Go with Bubbletea and Wish. Matrix rain intro, fake boot sequence, 4 colour themes, split-pane projects view, live visitor counter, jittering ping display, decrypt-reveal animations, vim motions, and smooth lerp transitions. You're looking at it right now."
    tags: [Go, Bubbletea, Docker, Wish, SSH]
    status: Live
    github: "github.com/trafalgar-2006/portfolio"

