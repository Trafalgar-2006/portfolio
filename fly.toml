# fly.toml — SSH Portfolio by Mohith Akshay Duggirala
app = "mohith-ssh-portfolio"
primary_region = "sin" # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  SSH_ENABLED  = "true"
  SSH_PORT     = "23234"
  HOST         = "0.0.0.0"
  COLORTERM    = "truecolor"
  TERM         = "xterm-256color"

# ── Web portfolio (HTTP on 8080 → 80 / 443) ──────────────────────────────────
[[services]]
  protocol      = "tcp"
  internal_port = 8080

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval     = "30s"
    grace_period = "10s"
    method       = "get"
    path         = "/health"
    protocol     = "http"
    timeout      = "5s"

# ── SSH TUI (raw TCP on 23234 → 41074) ───────────────────────────────────────
[[services]]
  protocol      = "tcp"
  internal_port = 23234

  [[services.ports]]
    port = 41074
